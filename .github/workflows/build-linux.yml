name: Build Linux Installer (.deb)

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Apply Offline Patches
        working-directory: ./upstream/superset
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git am ../../patches/*.patch

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libx11-dev libxkbfile-dev libsecret-1-dev

      - name: Install dependencies
        working-directory: ./upstream/superset
        run: bun install

      - name: Build Official Cloud Version (superset)
        working-directory: ./upstream/superset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure no local .env exists to use default cloud URLs
          rm -f .env
          # Change productName to 'superset'
          sed -i 's/"productName": "superset-dev"/"productName": "superset"/' apps/desktop/package.json
          bun run build
          # Remove the dev binary so it doesn't get packaged in the official build
          rm -f apps/desktop/dist/resources/bin/superset-dev
          cd apps/desktop
          bun run package -- --publish never
          # Move it to a separate directory to avoid conflicts
          mkdir -p release/official
          mv release/*.deb release/official/

      - name: Build Local Dev Version (superset-dev)
        working-directory: ./upstream/superset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Inject localhost endpoints
          echo "NEXT_PUBLIC_API_URL=http://localhost:3001" > .env
          echo "NEXT_PUBLIC_WEB_URL=http://localhost:3000" >> .env
          echo "NEXT_PUBLIC_MARKETING_URL=http://localhost:3000" >> .env
          echo "NEXT_PUBLIC_ELECTRIC_URL=http://localhost:3001" >> .env
          # Revert productName to 'superset-dev'
          sed -i 's/"productName": "superset"/"productName": "superset-dev"/' apps/desktop/package.json
          bun run build
          cd apps/desktop
          bun run package -- --publish never
          mkdir -p release/dev
          mv release/*.deb release/dev/

      - name: Upload .deb Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: superset-linux-installers
          path: |
            upstream/superset/apps/desktop/release/official/*.deb
            upstream/superset/apps/desktop/release/dev/*.deb

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            upstream/superset/apps/desktop/release/official/*.deb
            upstream/superset/apps/desktop/release/dev/*.deb

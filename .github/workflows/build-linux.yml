name: Build Linux Installer (.deb)

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libx11-dev libxkbfile-dev libsecret-1-dev

      - name: Install dependencies
        working-directory: ./upstream/superset
        run: bun install

      - name: Build packages and apps
        working-directory: ./upstream/superset
        run: bun run build

      - name: Package Desktop Installer
        working-directory: ./upstream/superset/apps/desktop
        run: bun run package

      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: superset-dev-linux-installer
          path: upstream/superset/apps/desktop/dist/*.deb

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: upstream/superset/apps/desktop/dist/*.deb
